name: Alpha-Orion CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Job 1: Lint & Static Analysis (Phase 1 Hygiene)
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Python linting with pylint and flake8
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint flake8

      - name: Run Python Linter
        run: |
          # Find all Python files and run pylint
          find . -name "*.py" -not -path "./venv/*" -not -path "./.venv/*" -not -path "./__pycache__/*" | head -20 | xargs pylint --disable=all --enable=E,F || true
          echo "Python linting completed"

      # Node.js linting with eslint
      - name: Install Node dependencies
        run: |
          if [ -f "package.json" ]; then
            npm ci || npm install
          fi

      - name: Run Node Linter
        run: |
          if [ -f "package.json" ]; then
            npx eslint . --ext .js,.jsx,.ts,.tsx --ignore-pattern node_modules/ || true
          fi
          echo "Node linting completed"


  # Job 2: Security Scanning (Phase 2 Security)
  security-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy Config Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for potential hardcoded secrets..."
          # Check for common secret patterns (this is a basic check)
          if grep -r "password.*=" --include="*.tf" --include="*.yml" --include="*.yaml" . | grep -v "variables.tf" | grep -v "sensitive" | head -5; then
            echo "⚠️  Warning: Potential hardcoded secrets found. Please review."
          else
            echo "✅ No obvious hardcoded secrets detected"
          fi
        continue-on-error: true

      - name: Terraform Validate
        run: |
          if command -v terraform &> /dev/null; then
            terraform fmt -check -recursive || true
            echo "Terraform validation completed"
          else
            echo "Terraform not installed, skipping validation"
          fi
        continue-on-error: true
