name: Alpha-Orion CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Job 1: Lint & Static Analysis (Phase 1 Hygiene)
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Placeholder for actual linting commands (e.g., pylint, eslint)
      - name: Run Linter (Placeholder)
        run: echo "Linting checks passed (TODO: Add pylint/eslint)"

  # Job 2: Security Scanning (Phase 2 Security)
  security-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy Config Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'