name: Build and Push

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  PROJECT_ID: alpha-orion
  REGION: us-central1
  REPO_NAME: alpha-orion-repo

jobs:
  build-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        service: 
          - eye-scanner
          - brain-orchestrator
          - flash-loan-executor
          - user-api-service
          - withdrawal-service
          - ai-agent-service
          - ai-optimizer
          - benchmarking-scraper-service
          - brain-ai-optimization-orchestrator
          - brain-risk-management
          - brain-simulation
          - brain-strategy-engine
          - dataflow-cep
          - dataflow-market-data-ingestion
          - hand-blockchain-proxy
          - hand-smart-order-router
          - order-management-service


    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Check service directory exists
        id: check-dir
        run: |
          if [ -d "./backend-services/services/${{ matrix.service }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "path=./backend-services/services/${{ matrix.service }}" >> $GITHUB_OUTPUT
          elif [ -d "./${{ matrix.service }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "path=./${{ matrix.service }}" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  Directory for ${{ matrix.service }} not found, skipping build"
          fi

      - name: Build and Push
        if: steps.check-dir.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.check-dir.outputs.path }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
