# Alpha-Orion Unified Render Deployment
# Architect's Note: Configuration upgraded for production readiness.

previewsEnabled: true # Enable Preview Environments for testing before merging to main.

services:
  - name: alpha-orion-alpha
    type: web
    region: frankfurt # Co-locate services to minimize latency.
    runtime: node
    plan: standard # Upgrade instance type for production load.
    buildCommand: cd frontend && npm install && npm run build && cd ../backend-services/services/user-api-service && npm install
    startCommand: cd backend-services/services/user-api-service && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: JWT_SECRET
        generateValue: true
      # RPC URLs should be secrets, not hardcoded values
      - key: POLYGON_RPC_URL
        fromSecret: true
      - key: ETHEREUM_RPC_URL
        fromSecret: true
      # --- GASLESS INFRASTRUCTURE (Pimlico) ---
      - key: GASLESS_MODE_ENABLED
        value: "true"
      - key: PIMLICO_API_KEY
        fromSecret: true
      # --- PROFITABILITY GUARDRAILS ---
      - key: MIN_PROFIT_THRESHOLD_USD
        value: "5.00" # Do not execute trades for pennies; covers operational overhead.
      - key: MAX_GAS_PRICE_GWEI
        value: "150" # Circuit breaker: Stop trading if network is congested.
      - key: SLIPPAGE_TOLERANCE_PCT
        value: "0.5" # Strict slippage to prevent bad fills.
      - key: EXECUTION_TIMEOUT_MS
        value: "2000" # Fail fast: If trade takes >2s, the opportunity is likely gone.
      # --------------------------------
      # Link to the Brain service
      - key: BRAIN_SERVICE_URL
        fromService:
          type: web
          name: alpha-orion-brain
          envVarKey: RENDER_EXTERNAL_URL
      # Link to Redis
      - key: REDIS_URL
        fromService:
          type: redis
          name: alpha-orion-redis
          property: connectionString
      # Link to PostgreSQL
      - key: DATABASE_URL
        fromDatabase:
          name: alpha-orion-db
          property: connectionString
    healthCheckPath: /health

  - name: alpha-orion-brain
    type: web
    region: frankfurt # Co-locate services to minimize latency.
    runtime: python
    plan: standard # Upgrade instance type for production load.
    buildCommand: cd backend-services/services/brain-ai-optimization-orchestrator && pip install -r requirements.txt
    # OPTIMIZATION: Use 4 threads per worker to handle concurrent price checks (I/O bound)
    startCommand: cd backend-services/services/brain-ai-optimization-orchestrator && gunicorn --workers 2 --threads 4 --worker-class gthread src.app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      # --- STRATEGIC VISION (RPCs) ---
      - key: POLYGON_RPC_URL
        fromSecret: true
      - key: ETHEREUM_RPC_URL
        fromSecret: true
      # --- GASLESS INFRASTRUCTURE (Pimlico) ---
      - key: GASLESS_MODE_ENABLED
        value: "true"
      - key: PIMLICO_API_KEY
        fromSecret: true
      # --- STRATEGIC GUARDRAILS (Synchronized with Alpha) ---
      - key: MIN_PROFIT_THRESHOLD_USD
        value: "5.00"
      - key: MAX_GAS_PRICE_GWEI
        value: "150"
      - key: SLIPPAGE_TOLERANCE_PCT
        value: "0.5"
      # --- SCOPE OF ENGAGEMENT ---
      - key: TARGET_EXCHANGES
        value: "uniswap_v3,sushiswap,quickswap" # Define valid hunting grounds.
      - key: TARGET_TOKENS
        value: "WETH,USDC,USDT,WBTC,MATIC" # Whitelist to avoid honeypots.
      # --- STRATEGY ALIGNMENT (16 Strategies) ---
      - key: ENABLED_STRATEGIES
        value: "all" # Activates all 16 strategies (Spatial, Triangular, FlashLoan, etc.) defined in the codebase.
      - key: MAX_CONCURRENT_STRATEGIES
        value: "8" # Allow parallel execution of multiple strategies.
      - key: FLASH_LOAN_ENABLED
        value: "true" # Required for capital-efficient arbitrage.
      # Link to Redis
      - key: REDIS_URL
        fromService:
          type: redis
          name: alpha-orion-redis
          property: connectionString
      # Link to PostgreSQL
      - key: DATABASE_URL
        fromDatabase:
          name: alpha-orion-db
          property: connectionString
    # CRITICAL: Add a health check for Render to monitor this service
    healthCheckPath: /health

  - name: alpha-orion-frontend
    type: static
    region: frankfurt
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: alpha-orion-alpha
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: alpha-orion-db
    region: frankfurt
    plan: standard # Production grade persistence
    databaseName: alphaorion
    user: alphaorion

redis:
  - name: alpha-orion-redis
    region: frankfurt # Co-locate with services.
    plan: standard # CRITICAL: Use HA plan for production.
    maxmemoryPolicy: allkeys-lru # Corrected key for eviction policy.
